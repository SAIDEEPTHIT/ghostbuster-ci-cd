name: GhostBuster CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      threshold:
        description: "Risk score threshold (0-100)"
        required: false
        default: "40"

permissions:
  contents: read
  pull-requests: write

jobs:
  ghostbuster:
    name: AI & Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run GhostBuster scan
        id: scan
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '40' }}"
          python -m ghostbuster scan . \
            --threshold "$THRESHOLD" \
            --report-dir reports \
            --fail-on-threshold || echo "SCAN_FAILED=1" >> $GITHUB_ENV
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghostbuster-reports
          path: reports/
          retention-days: 30

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/pr-summary.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Job summary
        if: always()
        run: |
          if [ -f reports/pr-summary.md ]; then
            cat reports/pr-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Enforce risk threshold
        if: always()
        run: |
          if [ "$SCAN_FAILED" = "1" ]; then
            echo "::error::GhostBuster risk score exceeds threshold — blocking deploy."
            exit 1
          fi
